name: Run Telegram Bot

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'

jobs:
  bot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run bot
      env:
        BOT_TOKEN: ${{ 8613129642:AAHIOUvHUCWsa-2dHxLi1A5FNGEE-J9llpk }}
      run: |
        python bot.py
